<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmFriend | AI & Software Consulting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0a0a;
            --secondary: #1a1a1a;
            --accent: #c9a962;
            --accent-light: #e5d4a1;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 1rem;
            text-align: center;
        }
        h1 span { color: var(--accent); }
        .tagline {
            color: var(--text-muted);
            font-size: 1.125rem;
            margin-bottom: 3rem;
            text-align: center;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--secondary);
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .link:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
        .link.primary {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }
        .link.primary:hover {
            background: var(--accent-light);
        }
        .footer {
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <h1>Farm<span>Friend</span></h1>
    <p class="tagline">AI & Software Consulting</p>
    <div class="links">
        <a href="https://calendly.com/scrimwiggins/consultation" class="link primary">
            <i class="far fa-calendar"></i> Book Consultation
        </a>
        <a href="https://clawd.me" class="link">
            <i class="fas fa-robot"></i> Clawdbot
        </a>
        <a href="https://github.com/0-CYBERDYNE-SYSTEMS-0" class="link">
            <i class="fab fa-github"></i> GitHub
        </a>
        <a href="https://t.me/scrimwiggins" class="link">
            <i class="fab fa-telegram"></i> Telegram
        </a>
    </div>
    <p class="footer">© 2026 FarmFriend Consulting</p>
</body>
</html>
